# .github/workflows/deploy.yml
# Deploy Astro site to GitHub Pages on push to main.
# See .squad/decisions/inbox/data-deploy-approach.md for rationale.
#
# Prerequisites (one-time setup in GitHub repo settings):
#   Settings → Pages → Source: "GitHub Actions"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger

# Grant GITHUB_TOKEN the permissions required to deploy to Pages
permissions:
  contents: read
  pages:    write
  id-token: write

# Allow only one concurrent deployment; do not cancel in-progress deployments.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Build Astro
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: dist/

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
